# Render Blueprint — "기억의 발자국" 무료 배포 설정
# 사용법: Render 대시보드 → [New +] → [Blueprint] → 이 GitHub 레포 연결 →
#         KAKAO_JS_KEY, GEMINI_API_KEY 두 개를 직접 입력 → [Apply]
services:
  - type: web
    name: memory-footprint        # 배포 주소가 https://memory-footprint.onrender.com 처럼 됨 (이름은 바꿔도 됨)
    runtime: node
    plan: free                    # 무료 플랜 (신용카드 불필요)
    region: singapore             # 한국에서 가장 가까운 지역
    buildCommand: npm install
    # 시작할 때 시드를 먼저 실행해서 데모 데이터를 채움.
    # (demo 계정이 이미 있으면 시드는 바로 건너뜀)
    # 무료 티어는 디스크가 휘발성이라, 재시작 때마다 데모 데이터를 다시 채워 항상 보이게 함.
    startCommand: node seed.js; node server.js
    envVars:
      - key: NODE_VERSION
        value: 22.22.3            # node:sqlite가 플래그 없이 동작하는 버전 (로컬과 동일)
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SESSION_SECRET
        generateValue: true       # Render가 무작위 비밀 문자열을 자동 생성
      - key: KAKAO_JS_KEY
        sync: false               # 대시보드에서 직접 입력 (깃/코드에 안 올라감)
      - key: GEMINI_API_KEY
        sync: false               # 대시보드에서 직접 입력
