<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기억의 발자국 - 날짜별</title>
  <!-- 폰트: 제목용 Jua(둥근 귀여운), 본문용 Noto Sans KR(깔끔한 고딕) -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="panel-collapsed">
  <!-- 상단 내비게이션 + 기간 필터는 common.js의 renderNav()가 그려 넣음 -->
  <!-- panel-collapsed: 처음부터 패널 접힌 상태로 시작 (펼쳐졌다 접히는 깜빡임 방지) -->

  <!-- 지도와 같은 구조: 왼쪽 메인(달력) + 오른쪽 패널(이 날의 기억) -->
  <div class="map-layout cal-layout">
    <div class="cal-main">
      <h1>날짜로 보는 기억</h1>

      <!-- 달 이동 -->
      <div class="cal-head">
        <button id="prevBtn">◀</button>
        <strong id="calTitle"></strong>
        <button id="nextBtn">▶</button>
        <!-- 월/년 보기 전환 -->
        <div class="cal-mode">
          <button id="modeMonth" class="on">월</button>
          <button id="modeYear">년</button>
        </div>
      </div>

      <!-- 달력 격자 (기록 있는 날은 칸 자체가 얼굴이 됨) -->
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- 오른쪽 패널: 날짜를 누르면 "이 날의 기억"이 여기에 (기본은 안내 문구) -->
    <aside class="panel" id="panel">
      <div class="panel-head">
        <h2 class="panel-title">이 날의 기억</h2>
        <button class="close" id="panelClose">✕</button>
      </div>
      <div id="panelBody"></div>
    </aside>

    <!-- 패널 접기/펼치기 토글 -->
    <button class="panel-toggle" id="panelToggle" title="이 날의 기억 접기/펼치기" aria-label="이 날의 기억 접기/펼치기">‹</button>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/calendar.js"></script>
</body>
</html>
