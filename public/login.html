<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기억의 발자국 - 로그인</title>
  <!-- 링크를 공유했을 때 보이는 미리보기(설명/제목) -->
  <meta name="description" content="일기를 쓰면 AI가 제목과 감정을 찾아, 지도와 달력에 감정 표정으로 새겨 주는 감정 일기 사이트." />
  <meta property="og:title" content="기억의 발자국" />
  <meta property="og:description" content="하루의 감정이 장소와 날짜에 새겨집니다. 일기를 쓰면 AI가 제목·감정·키워드를 정리해 지도와 달력에 표정으로 남겨 줘요." />
  <meta property="og:type" content="website" />
  <!-- 폰트: 제목용 Jua(둥근 귀여운), 본문용 Noto Sans KR(깔끔한 고딕) -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <h1><span class="logo-mark">👣</span> 기억의 발자국</h1>
    <p class="sub">하루의 감정이 장소와 날짜에 새겨집니다 ✎</p>

    <div class="card">
      <!-- 로그인 / 회원가입 탭 -->
      <div class="tabs">
        <button id="tabLogin" class="active">로그인</button>
        <button id="tabRegister">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form id="loginForm">
        <label>아이디</label>
        <input id="loginId" autocomplete="username" />
        <label>비밀번호</label>
        <input id="loginPw" type="password" autocomplete="current-password" />
        <button class="btn main" style="width:100%; margin-top:20px;">로그인</button>
        <p class="error" id="loginErr"></p>
      </form>

      <!-- 회원가입 폼 (처음엔 숨김) -->
      <form id="registerForm" style="display:none;">
        <label>아이디 (3자 이상)</label>
        <div class="check-row">
          <input id="regId" autocomplete="off" />
          <button type="button" class="btn" id="checkBtn">중복확인</button>
        </div>
        <p class="hint" id="checkMsg"></p>
        <label>비밀번호 (4자 이상)</label>
        <input id="regPw" type="password" autocomplete="new-password" />
        <label>비밀번호 재입력</label>
        <input id="regPw2" type="password" autocomplete="new-password" />
        <button class="btn main" style="width:100%; margin-top:20px;">가입하기</button>
        <p class="error" id="regErr"></p>
      </form>
    </div>
    <footer class="copyright">© 2026 기억의 발자국 · 이재아 · 강원대학교 웹프로그래밍</footer>
  </div>

  <script src="/js/common.js"></script>
  <script>
    // ---------- 탭 전환 ----------
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    function showTab(isLogin) {
      tabLogin.classList.toggle('active', isLogin);
      tabRegister.classList.toggle('active', !isLogin);
      loginForm.style.display = isLogin ? 'block' : 'none';
      registerForm.style.display = isLogin ? 'none' : 'block';
    }
    tabLogin.onclick = () => showTab(true);
    tabRegister.onclick = () => showTab(false);

    // ---------- 로그인 ----------
    loginForm.onsubmit = async (e) => {
      e.preventDefault(); // 폼의 기본 새로고침 동작 막기
      try {
        await api('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginId').value.trim(),
            password: document.getElementById('loginPw').value,
          }),
        });
        location.href = '/index.html'; // 성공하면 지도 페이지로
      } catch (err) {
        document.getElementById('loginErr').textContent = err.message;
      }
    };

    // ---------- 아이디 중복확인 ----------
    let checkedId = null; // 중복확인을 통과한 아이디를 기억해 둠
    document.getElementById('checkBtn').onclick = async () => {
      const username = document.getElementById('regId').value.trim();
      const msg = document.getElementById('checkMsg');
      if (username.length < 3) { msg.textContent = '아이디는 3자 이상이어야 합니다.'; return; }
      const { available } = await api('/api/auth/check?username=' + encodeURIComponent(username));
      if (available) {
        msg.textContent = '사용 가능한 아이디입니다.';
        msg.className = 'success';
        checkedId = username;
      } else {
        msg.textContent = '이미 사용 중인 아이디입니다.';
        msg.className = 'error';
        checkedId = null;
      }
    };

    // ---------- 회원가입 ----------
    registerForm.onsubmit = async (e) => {
      e.preventDefault();
      const err = document.getElementById('regErr');
      const username = document.getElementById('regId').value.trim();

      // 중복확인을 먼저 했는지 검사
      if (checkedId !== username) { err.textContent = '아이디 중복확인을 해 주세요.'; return; }

      try {
        await api('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            password: document.getElementById('regPw').value,
            passwordConfirm: document.getElementById('regPw2').value,
          }),
        });
        location.href = '/index.html'; // 가입과 동시에 로그인됨
      } catch (e2) {
        err.textContent = e2.message;
      }
    };
  </script>
</body>
</html>
