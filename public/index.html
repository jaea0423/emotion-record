<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기억의 발자국 - 지도</title>
  <!-- 폰트: 제목용 Jua(둥근 귀여운), 본문용 Noto Sans KR(깔끔한 고딕) -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="panel-collapsed">
  <!-- 상단 내비게이션 + 기간 필터는 common.js의 renderNav()가 그려 넣음 -->
  <!-- panel-collapsed: 처음부터 패널 접힌 상태로 시작해, 펼쳐졌다 접히는 깜빡임을 없앰 -->

  <div class="map-layout">
    <div id="map"></div>

    <!-- 감정 9종: 지도 좌측 중앙에 작은 알약으로 떠 있음 (패널 아님) -->
    <aside class="emotion-float" id="emotionList"></aside>

    <!-- 오른쪽 고정 패널: 기억 목록 (기본은 안내 문구, 마커를 누르면 기억이 보임) -->
    <aside class="panel" id="panel">
      <div class="panel-head">
        <h2 class="panel-title">기억 목록</h2>
        <button class="close" id="panelClose">✕</button>
      </div>
      <div id="panelBody"></div>
    </aside>

    <!-- 오른쪽 패널 접기/펼치기 토글 (패널 왼쪽 경계에 붙어 따라 움직임) -->
    <button class="panel-toggle" id="panelToggle" title="기억 목록 접기/펼치기" aria-label="기억 목록 접기/펼치기">‹</button>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/map.js"></script>
</body>
</html>
