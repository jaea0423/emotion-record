<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기억의 발자국 - 기록하기</title>
  <!-- 폰트: 제목용 Jua(둥근 귀여운), 본문용 Noto Sans KR(깔끔한 고딕) -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- 로고/내 정보/독은 common.js의 renderNav()가 그려 넣음 -->

  <div class="page">
    <h1>오늘의 기록</h1>

    <form id="writeForm">
      <!-- ===== 필수 ===== -->
      <div class="card">
        <h2 class="form-sec">필수 <span class="req">*</span></h2>

        <label>어디에 있었나요?</label>
        <div class="check-row">
          <input id="placeQuery" placeholder="장소 이름으로 검색 (예: 스타벅스 성수)" />
          <button type="button" class="btn" id="searchBtn">검색</button>
          <button type="button" class="btn" id="pinBtn">지도에서</button>
        </div>
        <div class="place-results" id="placeResults" style="display:none;"></div>
        <div class="selected-place" id="selectedPlace" style="display:none;"></div>

        <label>언제였나요?</label>
        <input id="diaryDate" type="date" />

        <label>그 곳에서 어떤 일이 있었나요?</label>
        <textarea id="content" rows="8" placeholder="일기를 적으면 AI가 제목과 감정, 키워드를 정리해 드려요."></textarea>
      </div>

      <!-- ===== 선택 ===== -->
      <div class="card" style="margin-top:20px;">
        <h2 class="form-sec">선택</h2>

        <label>이 순간을 남길 수 있는 사진이 있나요?</label>
        <input id="photo" type="file" accept="image/*" hidden />
        <div class="photo-row">
          <button type="button" class="btn" id="photoBtn">📷 사진 고르기</button>
          <span class="hint" id="photoName">선택된 사진 없음</span>
        </div>
        <div class="photo-preview" id="photoPreview" style="display:none;">
          <img id="photoImg" alt="사진 미리보기" />
          <button type="button" class="pp-del" id="photoDel" title="사진 빼기">✕</button>
        </div>

        <label>지금 이 순간과 가장 어울리는 노래는 무엇인가요?</label>
        <div class="check-row">
          <input id="musicUrl" placeholder="유튜브 또는 스포티파이 링크 붙여넣기" />
          <button type="button" class="btn" id="musicBtn">불러오기</button>
        </div>
        <div class="music-preview" id="musicPreview" style="display:none;">
          <img id="musicThumb" alt="앨범 표지" />
          <span id="musicTitle"></span>
        </div>
      </div>

      <!-- 1단계: AI가 제목/감정/키워드를 제안 (아직 저장 아님) -->
      <button class="btn ai-btn" style="width:100%; margin-top:24px;" id="submitBtn">✨ AI와 함께 정리하기</button>
      <p class="error" id="formErr"></p>
    </form>

    <!-- 2단계: AI 제안 확인/수정 후 "기록으로 남기기" (write.js가 채움) -->
    <div class="card" id="resultCard" style="display:none; margin-top:28px; text-align:center;"></div>
  </div>

  <!-- 지도에서 핀으로 위치 고르는 모달 (write.js가 동작을 채움) -->
  <div class="modal-back" id="pinModal" style="display:none;">
    <div class="modal-card">
      <h2 class="form-sec">지도에서 위치 선택</h2>
      <p class="hint">지도를 움직여서 가운데 핀을 원하는 곳에 맞춰 주세요</p>
      <div id="pinMapWrap">
        <div id="pinMap"></div>
        <div class="center-pin">📍</div>
      </div>
      <p class="hint" id="pinAddr" style="margin-top:10px;">주소 확인 중...</p>
      <label>이 장소에 대해 설명해 주세요 <span class="hint">(비워 두면 주소로 저장돼요)</span></label>
      <input id="pinDesc" placeholder="예: 우리 동네 산책길, 자취방 옥상" />
      <div style="display:flex; gap:8px; margin-top:16px;">
        <button type="button" class="btn" id="pinCancel" style="flex:1;">취소</button>
        <button type="button" class="btn main" id="pinOk" style="flex:2;">이 위치로 선택</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/write.js"></script>
</body>
</html>
